<div class="preview-overlay animate-fade-in" *ngIf="job">
  <div class="preview-modal glass-panel">
    <div class="preview-header">
      <h3>{{ job.originalFile.name }}</h3>
      <button class="icon-btn" (click)="close.emit()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="preview-content transparent-bg">
      <img [src]="showOriginal ? job.originalUrl : job.processedUrl" alt="Preview Image" class="preview-image">
      
      <div class="toggle-container">
        <button class="toggle-btn" [class.active]="showOriginal" (click)="showOriginal = true">Original</button>
        <button class="toggle-btn" [class.active]="!showOriginal" (click)="showOriginal = false">Removed BG</button>
      </div>
    </div>

    <div class="preview-footer">
      <a class="btn-primary" [href]="job.processedUrl" [download]="'rmbg_' + job.originalFile.name">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Download HD
      </a>
    </div>
  </div>
</div>
