<div 
  class="card bg-dark text-white text-center p-5 mb-4 border"
  [class.border-primary]="isDragOver"
  [class.bg-secondary]="isDragOver"
  style="border-style: dashed !important; border-width: 2px !important;"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
>
  <div class="card-body">
    <div class="mb-3 text-primary">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="17 8 12 3 7 8"></polyline>
        <line x1="12" y1="3" x2="12" y2="15"></line>
      </svg>
    </div>
    
    <h3 class="h4 mb-2">Drag & Drop images here</h3>
    <p class="text-muted mb-4">or select files to remove backgrounds locally</p>
    
    <div class="d-flex justify-content-center gap-3">
      <button class="btn btn-primary px-4 py-2" (click)="fileInput.click()">
        Choose Files
      </button>
      <button class="btn btn-outline-light px-4 py-2" (click)="folderInput.click()">
        Upload Folder
      </button>
    </div>

    <input 
      #fileInput
      type="file" 
      multiple 
      accept="image/png, image/jpeg, image/webp" 
      style="display: none"
      (change)="onFilesSelected($event)"
    >
    <input 
      #folderInput
      type="file" 
      webkitdirectory directory multiple 
      style="display: none"
      (change)="onFilesSelected($event)"
    >
  </div>
</div>
